[project]
name = "node-wire-runtime"
version = "0.1.0"
description = "Node Wire runtime — connector framework, resilience, observability, and pluggable secrets"
requires-python = ">=3.11"
authors = [{ name = "AOT", email = "dev@aot.local" }]
readme = "README.md"

dependencies = [
    "pydantic>=2.6.0,<3.0.0",
    "tenacity>=8.2.0",
    "pybreaker>=1.0.0",
    "opentelemetry-api>=1.24.0",
    "opentelemetry-sdk>=1.24.0",
    "opentelemetry-exporter-otlp>=1.24.0",
    "traceloop-sdk>=0.53.0",
    "pyyaml>=6.0.1",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
# Cloud secret backends — install only what your deployment needs
aws   = ["boto3>=1.34.0"]
vault = ["hvac>=2.1.0"]
azure = ["azure-keyvault-secrets>=4.8.0", "azure-identity>=1.16.0"]
gcp   = ["google-cloud-secret-manager>=2.20.0"]

[build-system]
requires = ["setuptools>=69.0.0", "cython>=3.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["../../src"]
include = ["node_wire_runtime*"]

# Ship connectors.yaml.sample as a non-Python package resource
[tool.setuptools.package-data]
node_wire_runtime = ["connectors.yaml.sample"]
