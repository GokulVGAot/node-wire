[project]
name = "node-wire-salesforce"
version = "0.1.0"
description = "Node Wire connector — Salesforce CRM"
requires-python = ">=3.11"
authors = [{ name = "AOT", email = "dev@aot.local" }]

dependencies = [
    "node-wire-runtime>=0.1.0",
    "httpx>=0.27.0",
]

[project.entry-points."node_wire.connectors"]
salesforce = "node_wire_salesforce.logic"

[build-system]
requires = ["setuptools>=69.0.0", "cython>=3.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["../../../src"]
include = ["node_wire_salesforce*"]
