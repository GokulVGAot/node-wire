[project]
name = "node-wire-smtp"
version = "0.1.0"
description = "Node Wire connector — SMTP email sending (async)"
requires-python = ">=3.11"
authors = [{ name = "AOT", email = "dev@aot.local" }]

dependencies = [
    "node-wire-runtime>=0.1.0",
    "aiosmtplib>=3.0.1",
    "email-validator>=2.0.0",
]

[project.entry-points."node_wire.connectors"]
smtp = "node_wire_smtp.logic"

[build-system]
requires = ["setuptools>=69.0.0", "cython>=3.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["../../../src"]
include = ["node_wire_smtp*"]
