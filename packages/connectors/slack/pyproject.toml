[project]
name = "node-wire-slack"
version = "1.0.0"
description = "Node Wire connector — Slack API (messaging and file uploads)"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "AOT Technologies", email = "opensource@aot-technologies.com" }]

dependencies = [
    "node-wire-runtime>=1.0.0",
    "httpx[http2]>=0.27.0,<0.28.0",
]

[project.entry-points."node_wire.connectors"]
slack = "node_wire_slack.logic"

[build-system]
requires = ["setuptools>=69.0.0", "cython>=3.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["../../../src"]
include = ["node_wire_slack*"]
