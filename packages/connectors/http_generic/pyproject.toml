[project]
name = "node-wire-http-generic"
version = "0.1.0"
description = "Node Wire connector — generic HTTP REST client (GET/POST/PUT/DELETE/PATCH)"
requires-python = ">=3.11"
authors = [{ name = "AOT", email = "dev@aot.local" }]

dependencies = [
    "node-wire-runtime>=0.1.0",
    "httpx[http2]>=0.27.0,<0.28.0",
]

[project.entry-points."node_wire.connectors"]
http_generic = "node_wire_http_generic.logic"

[build-system]
requires = ["setuptools>=69.0.0", "cython>=3.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["../../../src"]
include = ["node_wire_http_generic*"]
