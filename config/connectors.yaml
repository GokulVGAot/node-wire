# Connector enable/list — see docs/connectors.md
#
# REST API auth (not stored here; set in environment):
#   NW_REST_API_KEY — required for /connectors, /playground, /scenarios unless NW_REST_AUTH_DISABLED=true
#   NW_REST_LOAD_DOTENV=false — recommended in production (no .env file)
#
# Plugin allowlist (optional):
#   NW_ALLOWED_CONNECTORS=fhir_epic,http_generic,...
#   NW_CONNECTOR_MODULE_PREFIX=node_wire_
#
# Secrets backend (optional):
#   NW_SECRET_BACKEND=env | aws_env
#   NW_AWS_SECRETS_MANAGER_SECRET_ID=...  (when aws_env)
#
connectors:
  http_generic:
    enabled: true
    exposed_via: ["rest", "grpc", "mcp"]
  smtp:
    enabled: true
    exposed_via: ["rest", "grpc", "mcp"]
  stripe:
    enabled: true
    exposed_via: ["grpc", "mcp"]
  google_drive:
    enabled: true
    exposed_via: ["rest", "grpc", "mcp"]
  fhir_epic:
    enabled: true
    exposed_via: ["rest", "grpc", "mcp"]
    base_url: "${EPIC_FHIR_BASE_URL:https://fhir.epic.sandbox/api/FHIR/R4}"
    oauth_token_url: "${EPIC_TOKEN_URL:https://fhir.epic.sandbox/api/FHIR/R4/oauth/token}"
  fhir_cerner:
    enabled: true
    exposed_via: ["rest", "grpc", "mcp"]
    base_url: "${CERNER_FHIR_BASE_URL:https://fhir-ehr-code.cerner.com/r4/your-tenant-id}"
    oauth_token_url: "${CERNER_TOKEN_URL:https://authorization.cerner.com/tenants/your-tenant-id/protocols/oauth2/profiles/smart-v1/token}"
    scopes: "${CERNER_SCOPES:system/Patient.read system/Encounter.read system/DocumentReference.read system/DocumentReference.write}"

