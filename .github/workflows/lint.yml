name: Lint and Type Check

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [main, master]

jobs:
  lockfile-check:
    name: Lockfile freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

  ruff:
    name: Ruff Linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run Ruff (Linting)
        # --output-format=github automatically creates inline annotations on your PR code!
        run: uv run ruff check --output-format=github .

      - name: Run Ruff (Formatting Check)
        run: uv run ruff format --check .

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run REUSE lint
        run: uv run reuse lint

  mypy:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run Mypy (Type checking)
        run: uv run mypy
