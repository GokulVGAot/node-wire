name: Quality gates

on:
  pull_request:
  push:
    branches: [main, master]

# This workflow enforces Bandit SAST on every PR and push to main/master.

jobs:
  bandit:
    name: Bandit security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev
      # Bandit exits non-zero when *any* finding exists (incl. low/medium). The
      # enforce step below gates on high only; use --exit-zero here so this step
      # always produces the JSON artifact and the job can print a summary.
      - name: Generate Bandit JSON report
        run: uv run bandit -c pyproject.toml -r src -f json -o bandit-report.json --exit-zero
      - name: Bandit findings summary (log)
        run: uv run python scripts/bandit_report_summary.py bandit-report.json
      - name: Upload Bandit report artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: error
      - name: Enforce high-severity Bandit gate
        run: uv run bandit -c pyproject.toml -r src --severity-level high
