version: '1'
server:
  name: salesforce-nw
  description: salesforce MCP via node-wire connector (node-wire-salesforce; auth/OTel
    inside node-wire)
runtime:
  type: node_wire
  connector_id: salesforce
spec:
  source: node-wire/src/node_wire_salesforce
  format: openapi3
  base_url: https://unused.invalid
  total_endpoints: 8
  scoped_endpoints: 8
workflows:
- MCP tools for node-wire connector `salesforce` (actions from logic.py)
- Auth and telemetry are handled by the node-wire connector runtime
groups:
- name: connector
  description: Actions from node_wire_salesforce.logic (dispatched via McpServer)
  tools:
  - tool_name: create_lead
    endpoint: POST /connectors/salesforce/create_lead
    description: Execute node-wire salesforce.create_lead (see src/node_wire_salesforce/logic.py
      + schema).
    response_kind: json
    hints:
    - 'MCP tool at runtime: salesforce.create_lead'
    - 'Packaged wheel: node-wire-salesforce'
  - tool_name: read_lead
    endpoint: POST /connectors/salesforce/read_lead
    description: Execute node-wire salesforce.read_lead (see src/node_wire_salesforce/logic.py
      + schema).
    response_kind: json
    hints:
    - 'MCP tool at runtime: salesforce.read_lead'
    - 'Packaged wheel: node-wire-salesforce'
  - tool_name: update_lead
    endpoint: POST /connectors/salesforce/update_lead
    description: Execute node-wire salesforce.update_lead (see src/node_wire_salesforce/logic.py
      + schema).
    response_kind: json
    hints:
    - 'MCP tool at runtime: salesforce.update_lead'
    - 'Packaged wheel: node-wire-salesforce'
  - tool_name: delete_lead
    endpoint: POST /connectors/salesforce/delete_lead
    description: Execute node-wire salesforce.delete_lead (see src/node_wire_salesforce/logic.py
      + schema).
    response_kind: json
    hints:
    - 'MCP tool at runtime: salesforce.delete_lead'
    - 'Packaged wheel: node-wire-salesforce'
  - tool_name: create_contact
    endpoint: POST /connectors/salesforce/create_contact
    description: Execute node-wire salesforce.create_contact (see src/node_wire_salesforce/logic.py
      + schema).
    response_kind: json
    hints:
    - 'MCP tool at runtime: salesforce.create_contact'
    - 'Packaged wheel: node-wire-salesforce'
  - tool_name: read_contact
    endpoint: POST /connectors/salesforce/read_contact
    description: Execute node-wire salesforce.read_contact (see src/node_wire_salesforce/logic.py
      + schema).
    response_kind: json
    hints:
    - 'MCP tool at runtime: salesforce.read_contact'
    - 'Packaged wheel: node-wire-salesforce'
  - tool_name: update_contact
    endpoint: POST /connectors/salesforce/update_contact
    description: Execute node-wire salesforce.update_contact (see src/node_wire_salesforce/logic.py
      + schema).
    response_kind: json
    hints:
    - 'MCP tool at runtime: salesforce.update_contact'
    - 'Packaged wheel: node-wire-salesforce'
  - tool_name: delete_contact
    endpoint: POST /connectors/salesforce/delete_contact
    description: Execute node-wire salesforce.delete_contact (see src/node_wire_salesforce/logic.py
      + schema).
    response_kind: json
    hints:
    - 'MCP tool at runtime: salesforce.delete_contact'
    - 'Packaged wheel: node-wire-salesforce'
auth:
  type: none
  notes: Auth is handled inside node-wire for `salesforce`. Set connector secrets
    from node-wire sample.env / config/connectors.yaml (see generated .env.example).
